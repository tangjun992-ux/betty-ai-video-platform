name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · tests + migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "moto[s3]" pytest
      - name: Self-contained unit tests
        run: pytest tests/test_moderation.py tests/test_storage.py -q
      - name: Alembic migrations apply on a fresh DB
        env:
          DATABASE_URL: "sqlite:////tmp/ci_alembic.db"
        run: alembic upgrade head

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        continue-on-error: true
        run: npm run lint --if-present
      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
