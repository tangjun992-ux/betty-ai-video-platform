name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · full pytest + migrations
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "moto[s3]" pytest aiosqlite
      - name: Full unit / API test suite
        env:
          ENV: test
          DATABASE_URL: "sqlite+aiosqlite:////tmp/ci_tests.db"
        run: pytest tests/ -q --tb=line
      - name: Alembic migrations apply on a fresh DB
        env:
          DATABASE_URL: "sqlite:////tmp/ci_alembic.db"
        run: alembic upgrade head
      - name: Mapping smoke (offline)
        env:
          ENV: test
        run: python scripts/smoke_active_models.py mapping

  frontend:
    name: Frontend · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  e2e:
    name: Playwright · capability + betty smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install frontend + Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Start API
        working-directory: backend
        env:
          ENV: development
          DATABASE_URL: "sqlite+aiosqlite:////tmp/e2e.db"
          REDIS_URL: "redis://127.0.0.1:6379/0"
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          for i in $(seq 1 45); do curl -sf http://127.0.0.1:8000/health && break; sleep 1; done
      - name: Start frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1
          NEXT_TELEMETRY_DISABLED: "1"
        run: |
          npm run build
          npm run start -- --port 3000 &
          for i in $(seq 1 60); do curl -sf http://127.0.0.1:3000 >/dev/null && break; sleep 1; done
      - name: Run Playwright key specs
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api/v1
        run: npx playwright test e2e/capability.spec.ts e2e/betty.spec.ts --reporter=line
